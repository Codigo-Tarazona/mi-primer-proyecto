{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-money-bill-wave me-2"></i>Registrar Pago</h4>
                </div>
                <div class="card-body">
                    <h5 class="card-title text-secondary">Integrante: <strong>{{ usuario.nombre_completo }}</strong></h5>
                    <hr>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto del Pago ($)</label>
                            <input type="number" step="0.01" class="form-control" id="monto" name="monto" placeholder="Ej: 50.000" required>
                        </div>

                        <div class="mb-3">
                            <label for="mes" class="form-label">Mes Correspondiente</label>
                            <select class="form-select" id="mes" name="mes" required>
                                <option value="" selected disabled>Selecciona un mes...</option>
                                <option value="Enero">Enero</option>
                                <option value="Febrero">Febrero</option>
                                <option value="Marzo">Marzo</option>
                                <option value="Abril">Abril</option>
                                <option value="Mayo">Mayo</option>
                                <option value="Junio">Junio</option>
                                <option value="Julio">Julio</option>
                                <option value="Agosto">Agosto</option>
                                <option value="Septiembre">Septiembre</option>
                                <option value="Octubre">Octubre</option>
                                <option value="Noviembre">Noviembre</option>
                                <option value="Diciembre">Diciembre</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="metodo" class="form-label">Método de Pago</label>
                            <select class="form-select" id="metodo" name="metodo" required>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Transferencia">Transferencia</option>
                                <option value="Tarjeta">Tarjeta</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-check-circle me-2"></i>Confirmar y Generar Recibo
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
