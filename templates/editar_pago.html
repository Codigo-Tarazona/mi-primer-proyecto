{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="fas fa-edit me-2"></i>Editar Registro de Pago</h5>
                </div>
                <div class="card-body">
                    <h5 class="text-secondary">Editando registro de pago #{{ pago.id }}</h5>
                    <hr>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Monto del Pago ($)</label>
                            <input type="number" step="0.01" class="form-control" name="monto" value="{{ pago.monto }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Mes Correspondiente</label>
                            <select class="form-select" name="mes" required>
                                {% for m in ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"] %}
                                <option value="{{ m }}" {% if pago.mes_correspondiente == m %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Método de Pago</label>
                            <select class="form-select" name="metodo" required>
                                <option value="Efectivo" {% if pago.metodo == 'Efectivo' %}selected{% endif %}>Efectivo</option>
                                <option value="Transferencia" {% if pago.metodo == 'Transferencia' %}selected{% endif %}>Transferencia</option>
                                <option value="Tarjeta" {% if pago.metodo == 'Tarjeta' %}selected{% endif %}>Tarjeta</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Guardar Cambios
                            </button>
                            <a href="{{ url_for('ver_usuario', usuario_id=pago.usuario_id) }}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
