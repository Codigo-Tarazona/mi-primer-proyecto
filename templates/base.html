<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wolf Team Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; color: #333; }
        .navbar { background-color: #003366; }
        .btn-wolf { background-color: #00aaff; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">WOLF TEAM</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Trayectoria</a>
                <a class="nav-link" href="/registro">Registro</a>
                {% if current_user.is_authenticated %}
                    <a class="nav-link" href="/dashboard">Panel Admin</a>
                    <a class="nav-link text-warning" href="/logout">Salir</a>
                {% else %}
                    <a class="nav-link" href="/login">Entrenador</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
